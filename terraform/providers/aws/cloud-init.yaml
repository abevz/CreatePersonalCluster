#cloud-config

# Hostname configuration
hostname: ${hostname_prefix}
fqdn: ${hostname_prefix}.local

# User configuration
users:
  - default
  - name: ubuntu
    groups:
      - sudo
      - docker
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_public_key}
    sudo: ALL=(ALL) NOPASSWD:ALL

# Package updates and installations
package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - jq
  - unzip
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - software-properties-common

# System configuration for Kubernetes
write_files:
  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
  - path: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

runcmd:
  # Load kernel modules
  - modprobe overlay
  - modprobe br_netfilter
  
  # Apply sysctl settings
  - sysctl --system
  
  # Disable swap
  - swapoff -a
  - sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
  
  # Set timezone
  - timedatectl set-timezone UTC
  
  # Update hostname in /etc/hosts
  - echo "127.0.0.1 ${hostname_prefix}.local ${hostname_prefix}" >> /etc/hosts
  
  # Create marker file
  - touch /var/lib/cloud/instance/cpc-cloud-init-complete

final_message: "CPC cloud-init setup completed successfully"
